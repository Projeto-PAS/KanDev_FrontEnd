<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/cadastro.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>KanDev</h1>
        </div>

        <form>
            <div class="form-grupo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="form-grupo">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Digite seu email" required>
            </div>

            <div class="form-grupo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite uma senha" required>
            </div>

            <div class="form-grupo">
                <label for="confirmar-senha">Confirmar senha</label>
                <input type="password" id="confirmar-senha" placeholder="Digite novamente a senha" required>
            </div>

            <button type="submit" class="btn-criar-conta">
                <p>Cadastrar</p>
            </button>
        </form>

        <div class="separator">
            <span>ou</span>
        </div>

        <div id="g_id_onload"
            data-client_id="591098839856-6klpdd5q7lhg8humh41cmckh5qjtpetb.apps.googleusercontent.com.apps.googleusercontent.com"
            data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="outline"
            data-text="continue_with"      
            data-shape="pill"
            data-logo_alignment="left">
        </div>

        <div class="login-link">
            <p>Já possui uma conta? </p><a href="#">Entrar</a>
        </div>
    </div>
</body>
</html>
